; ============================================================
;  EasyTexMod - configuration
;  Relative paths are resolved from this file's folder.
; ============================================================

[Settings]
; Path to TexMod
TexMod=TexMod.exe

; Game executable that TexMod will launch (edit this!)
Game=YourGame.exe

; Folder where the .tpf packages live
ModFolder=Mod

; Base pause between UI actions, in milliseconds.
; Increase it (e.g. 600) if your PC is slow and the automation fails.
Delay=300

; 1 = click "Run" automatically and start the game | 0 = just leave everything loaded in TexMod
AutoRun=1

; 1 = when you close the game, TexMod closes too | 0 = TexMod stays open
CloseTexModOnExit=1

[LoadOrder]
; Mod load order, one per line (file name inside ModFolder, or a full path).
; Some mods depend on the order - the first one in the list is loaded first.
;
; If this section is left empty, EVERY .tpf in ModFolder is loaded
; in alphabetical order.
;
; Example:
;   MainTexturePack.tpf
;   SmallFixesOnTop.tpf
